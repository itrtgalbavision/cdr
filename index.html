<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Central de Radios Guatemala</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box;}

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(180deg,#0b1118,#121c27 40%,#0b1118);
color:white;
}

/* HEADER */

.header{
text-align:center;
padding:50px 20px 30px;
}

.header h1{
margin:0;
font-size:38px;
letter-spacing:2px;
font-weight:700;
background:linear-gradient(90deg,#00e5ff,#00bfff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.header p{
margin-top:10px;
opacity:.7;
font-size:14px;
}

/* GRID */

.contenedor{
width:90%;
max-width:1200px;
margin:40px auto 120px;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:22px;
}

/* TARJETAS */

.radio{
background:rgba(255,255,255,0.05);
border-radius:16px;
padding:18px 14px;
cursor:pointer;
transition:.3s;
border:1px solid rgba(255,255,255,0.08);
box-shadow:0 8px 22px rgba(0,0,0,.35);

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

height:140px;
text-align:center;
}

.radio:hover{
transform:translateY(-6px);
background:rgba(255,255,255,0.1);
}

.radio.activa{
border:1px solid #00e5ff;
box-shadow:0 0 18px rgba(0,229,255,.5);
}

.radio img{
width:90px;
height:55px;
object-fit:contain;
margin-bottom:8px;
padding:6px;
border-radius:10px;
border:2px solid rgba(0,191,255,.6);
box-shadow:0 0 8px rgba(0,191,255,.4);
}

.radio span{
font-size:13px;
font-weight:500;
line-height:1.2;
}

/* PLAYER */

.player{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#0f1822;
border-top:1px solid rgba(255,255,255,.1);
padding:14px 20px;

display:flex;
align-items:center;
justify-content:space-between;
}

.player-info{
display:flex;
align-items:center;
gap:12px;
}

.player-info img{
width:45px;
border-radius:6px;
}

.player-title{
font-size:14px;
}

.controls{
display:flex;
align-items:center;
gap:15px;
}

button{
background:#00bfff;
border:none;
color:white;
padding:7px 16px;
border-radius:6px;
cursor:pointer;
font-weight:500;
}

button:hover{
background:#00e5ff;
}

.volume{
width:110px;
}

/* RESPONSIVE */

@media(max-width:1000px){
.contenedor{grid-template-columns:repeat(3,1fr);}
}

@media(max-width:700px){
.contenedor{grid-template-columns:repeat(2,1fr);}
}

@media(max-width:450px){
.contenedor{grid-template-columns:1fr;}
}

</style>
</head>

<body>

<div class="header">
<h1>CENTRAL DE RADIOS GUATEMALA</h1>
<p>Escucha tus emisoras favoritas en vivo</p>
</div>

<div class="contenedor">

</div>

<div class="player">

<div class="player-info">
<img id="playerLogo">
<div class="player-title" id="playerTitle">Selecciona una radio</div>
</div>

<div class="controls">
<button onclick="togglePlay()">Play / Pause</button>
<input class="volume" type="range" min="0" max="1" step="0.01" value="0.8" onchange="setVolume(this.value)">
</div>

</div>

<audio id="audio"></audio>

<script>

let audio=document.getElementById("audio")
let title=document.getElementById("playerTitle")
let logo=document.getElementById("playerLogo")

function playRadio(el,url,name,img){

document.querySelectorAll(".radio").forEach(r=>r.classList.remove("activa"))
el.classList.add("activa")

audio.src=url
audio.play()

title.innerText=name
logo.src=img

}

function togglePlay(){

if(audio.paused){
audio.play()
}else{
audio.pause()
}

}

function setVolume(v){
audio.volume=v
}

</script>

</body>
</html>
