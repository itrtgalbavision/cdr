<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(180deg,#0b1118,#121c27 40%,#0b1118);
color:white;
}

/* HEADER */

.header{
text-align:center;
padding:60px 20px 40px;
}

.header h1{
margin:0;
font-size:42px;
letter-spacing:3px;
font-weight:700;
background:linear-gradient(90deg,#00e5ff,#00bfff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.header p{
margin-top:12px;
opacity:.7;
font-size:14px;
}

.header::after{
content:"";
display:block;
width:120px;
height:3px;
margin:25px auto 0;
background:linear-gradient(90deg,transparent,#00bfff,transparent);
}

/* GRID */

.contenedor{
width:90%;
max-width:1250px;
margin:40px auto 70px;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:28px;
}

/* TARJETAS */

.radio{
background:rgba(255,255,255,0.06);
border-radius:18px;
padding:30px 20px;
text-align:center;
text-decoration:none;
color:white;
transition:.35s;
border:1px solid rgba(255,255,255,0.08);
box-shadow:0 10px 30px rgba(0,0,0,0.35);
backdrop-filter:blur(10px);
position:relative;
overflow:hidden;
}

/* glow suave */

.radio::before{
content:"";
position:absolute;
top:-50%;
left:-50%;
width:200%;
height:200%;
background:radial-gradient(circle,#00bfff33,transparent 60%);
opacity:0;
transition:.4s;
}

.radio:hover::before{
opacity:1;
}

/* logo */

.radio img{
width:120px;
height:auto;
margin-bottom:15px;
padding:12px;
border-radius:14px;
border:2px solid rgba(0,191,255,.6);
box-shadow:0 0 10px rgba(0,191,255,.4);
transition:.35s;
}

/* nombre radio */

.radio span{
display:block;
font-size:15px;
font-weight:500;
letter-spacing:.4px;
}

/* hover */

.radio:hover{
transform:translateY(-8px) scale(1.02);
box-shadow:0 20px 40px rgba(0,0,0,.6);
background:rgba(255,255,255,0.1);
}

.radio:hover img{
transform:scale(1.08);
box-shadow:
0 0 12px #00e5ff,
0 0 25px #00e5ff;
}

/* FOOTER */

.footer{
text-align:center;
padding:25px;
font-size:12px;
opacity:.5;
border-top:1px solid rgba(255,255,255,.08);
}

/* RESPONSIVE */

@media(max-width:1100px){

.contenedor{
grid-template-columns:repeat(3,1fr);
}

}

@media(max-width:800px){

.contenedor{
grid-template-columns:repeat(2,1fr);
}

}

@media(max-width:500px){

.contenedor{
grid-template-columns:1fr;
}

.header h1{
font-size:26px;
}

}

</style>
</head>
